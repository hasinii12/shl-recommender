
services:
  - type: web
    name: shl-recommender
    runtime: python
    buildCommand: pip install -r requirements.txt && python build_index.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port `$PORT
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
